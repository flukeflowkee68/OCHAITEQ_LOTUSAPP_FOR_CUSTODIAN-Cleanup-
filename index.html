<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UN Inventory Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f7f9;
            --primary-color: #1e3a8a; /* สีกรมท่าเข้มสำหรับ Header */
            --un-blue: #009EDB;       /* สีฟ้า UN Blue แท้ */
            --un-blue-light: #e6f5fc; /* สีฟ้าอ่อนพาสเทลสำหรับ Badge */
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* Status Colors */
            --success-bg: #dcfce7;
            --success-text: #15803d;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Style */
        header {
            margin-bottom: 32px;
            border-left: 4px solid var(--un-blue); /* เส้นขอบข้างชื่อเป็นสีฟ้า UN */
            padding-left: 16px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
        }

        /* KPI Cards Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
