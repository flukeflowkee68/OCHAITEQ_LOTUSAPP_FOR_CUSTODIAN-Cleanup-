<!DOCTYPE html>
<html>
<head>
    <title>Inventory Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #0078D4;
            color: white;
        }
    </style>
</head>
<body>

<h1>Inventory Dashboard</h1>

<table>
    <tr>
        <th>Item</th>
        <th>Quantity</th>
    </tr>
    <tr>
        <td>Laptop</td>
        <td>15</td>
    </tr>
    <tr>
        <td>Monitor</td>
        <td>23</td>
    </tr>
</table>

</body>
</html>
